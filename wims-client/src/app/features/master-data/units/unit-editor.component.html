<dialog #dlg class="editor" (cancel)="onDialogCancel($event)">
  <header class="editor__head">
    <h3>{{ isNew() ? 'وحدة قياس جديدة' : 'تعديل وحدة قياس' }}</h3>
    <button type="button" class="iconbtn" (click)="cancel()" aria-label="إغلاق">
      <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor"
        stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 6l12 12M18 6L6 18" />
      </svg>
    </button>
  </header>

  @if (error()) {
    <div class="alert alert--error" role="alert">{{ error() }}</div>
  }

  <form class="editor__body" [formGroup]="form" (ngSubmit)="submit()">
    <div class="field">
      <label class="field__label" for="un-code">الرمز<span class="req">*</span></label>
      <input id="un-code" class="input" formControlName="code" dir="ltr"
        autocomplete="off" [class.is-invalid]="f.code.invalid && f.code.touched" />
      @if (f.code.invalid && f.code.touched) {
        <span class="field__error">الرمز مطلوب (10 أحرف كحدّ أقصى).</span>
      } @else if (!isNew()) {
        <span class="field__hint">الرمز غير قابل للتعديل.</span>
      }
    </div>

    <div class="field">
      <label class="field__label" for="un-name">الاسم<span class="req">*</span></label>
      <input id="un-name" class="input" formControlName="nameAr"
        [class.is-invalid]="f.nameAr.invalid && f.nameAr.touched" />
      @if (f.nameAr.invalid && f.nameAr.touched) {
        <span class="field__error">اسم الوحدة مطلوب.</span>
      }
    </div>

    <div class="field field--check">
      <label class="check">
        <input type="checkbox" formControlName="isBaseUnit" />
        <span>وحدة أساسية</span>
      </label>
    </div>

    <div class="editor__actions">
      <button type="button" class="btn btn--secondary" (click)="cancel()">إلغاء</button>
      <button type="submit" class="btn btn--primary"
        [class.is-loading]="saving()" [disabled]="saving()">
        @if (saving()) { <span class="spinner" aria-hidden="true"></span> }
        <span class="btn__label">حفظ</span>
      </button>
    </div>
  </form>
</dialog>
