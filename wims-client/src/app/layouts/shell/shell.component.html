<div class="shell" [class.shell--collapsed]="!navOpen()">
  <!-- التنقّل الجانبي (يمين في RTL) -->
  <aside class="sidenav">
    <div class="sidenav__brand">
      <span class="sidenav__seal" aria-hidden="true">
        @if (logoOk()) {
          <img class="sidenav__seal-img" src="logo.png" alt="" (error)="logoOk.set(false)" />
        } @else {
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="9.5" />
            <line x1="12" y1="7" x2="12" y2="15" />
            <line x1="8.5" y1="9.5" x2="15.5" y2="9.5" />
          </svg>
        }
      </span>
      <span class="sidenav__title">
        <b>WIMS</b>
        <small>وزارة العدل</small>
      </span>
    </div>

    <nav class="sidenav__nav" aria-label="التنقّل الرئيسي">
      @for (item of nav(); track item.path) {
        <a
          class="navlink"
          [routerLink]="item.path"
          routerLinkActive="navlink--active"
          [routerLinkActiveOptions]="{ exact: false }"
        >
          <span class="navlink__icon" [attr.data-icon]="item.icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              @switch (item.icon) {
                @case ('home') {
                  <path d="M4 11l8-6 8 6" /><path d="M6 10v9h12v-9" />
                }
                @case ('box') {
                  <path d="M4 8l8-4 8 4v8l-8 4-8-4Z" /><path d="M4 8l8 4 8-4M12 12v8" />
                }
                @case ('transfer') {
                  <path d="M4 8h13M14 5l3 3-3 3" /><path d="M20 16H7M10 13l-3 3 3 3" />
                }
                @case ('stamp') {
                  <circle cx="12" cy="8" r="4" /><path d="M8 13c-1 1-1 3 0 3h8c1 0 1-2 0-3" /><line x1="5" y1="20" x2="19" y2="20" />
                }
                @case ('clipboard') {
                  <rect x="6" y="4" width="12" height="16" rx="2" /><path d="M9 4h6v3H9z" /><line x1="9" y1="12" x2="15" y2="12" /><line x1="9" y1="16" x2="13" y2="16" />
                }
                @case ('chart') {
                  <line x1="5" y1="19" x2="19" y2="19" /><rect x="7" y="11" width="3" height="6" /><rect x="12" y="7" width="3" height="10" />
                }
                @case ('shield') {
                  <path d="M12 3l7 3v5c0 5-3 8-7 10-4-2-7-5-7-10V6Z" /><path d="M9 12l2 2 4-4" />
                }
                @case ('database') {
                  <ellipse cx="12" cy="6" rx="7" ry="3" /><path d="M5 6v6c0 1.7 3.1 3 7 3s7-1.3 7-3V6" /><path d="M5 12v6c0 1.7 3.1 3 7 3s7-1.3 7-3v-6" />
                }
              }
            </svg>
          </span>
          <span class="navlink__label">{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="sidenav__foot">
      <span class="badge badge--info"><span class="badge__dot"></span>الإصدار {{ version }}</span>
    </div>
  </aside>

  <!-- المحتوى -->
  <div class="shell__main">
    <header class="topbar">
      <button
        class="iconbtn"
        (click)="toggleNav()"
        [attr.aria-label]="navOpen() ? 'طيّ القائمة' : 'فتح القائمة'"
        [attr.aria-expanded]="navOpen()"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <line x1="4" y1="7" x2="20" y2="7" />
          <line x1="4" y1="12" x2="20" y2="12" />
          <line x1="4" y1="17" x2="20" y2="17" />
        </svg>
      </button>

      <div class="topbar__spacer"></div>

      <a class="iconbtn" routerLink="/inventory" aria-label="التنبيهات">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M6 9a6 6 0 0 1 12 0c0 5 2 6 2 6H4s2-1 2-6Z" />
          <path d="M10 20a2 2 0 0 0 4 0" />
        </svg>
      </a>

      <div class="usermenu">
        <button
          class="user user--btn"
          (click)="toggleUserMenu()"
          [attr.aria-expanded]="userMenuOpen()"
          aria-haspopup="menu"
        >
          @if (avatarUrl()) {
            <img class="user__avatar user__avatar--img" [src]="avatarUrl()" alt="" aria-hidden="true" />
          } @else {
            <span class="user__avatar" aria-hidden="true">{{ initial() }}</span>
          }
          <span class="user__meta">
            <b>{{ userName() || 'مستخدم' }}</b>
            <small>{{ primaryRole() }}</small>
          </span>
          <svg class="user__caret" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7 10l5 5 5-5" />
          </svg>
        </button>

        @if (userMenuOpen()) {
          <div class="usermenu__backdrop" (click)="closeUserMenu()"></div>
          <div class="usermenu__pop" role="menu">
            <label class="usermenu__item" role="menuitem">
              <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor"
                stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 8h3l1.5-2h7L18 8h2a1 1 0 0 1 1 1v9a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1Z" />
                <circle cx="12" cy="13" r="3.2" />
              </svg>
              تغيير الصورة الشخصية
              <input type="file" accept="image/png,image/jpeg,image/webp" hidden
                (change)="onChangePhoto($event)" />
            </label>
            @if (photoError()) {
              <p class="usermenu__error" role="alert">{{ photoError() }}</p>
            }
            <button class="usermenu__item" role="menuitem" (click)="openChangePassword()">
              <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor"
                stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                <rect x="5" y="11" width="14" height="9" rx="2" /><path d="M8 11V8a4 4 0 0 1 8 0v3" />
              </svg>
              تغيير كلمة المرور
            </button>
            <button class="usermenu__item usermenu__item--danger" role="menuitem" (click)="logout()">
              <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor"
                stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 12H5m0 0 3-3m-3 3 3 3" />
                <path d="M13 4h5a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1h-5" />
              </svg>
              تسجيل الخروج
            </button>
          </div>
        }
      </div>
    </header>

    <main class="content">
      <router-outlet />
    </main>

    <footer class="appfoot">
      © {{ year }} جميع الحقوق محفوظة لقطاع التطوير التقني ومركز المعلومات القضائي — وزارة العدل
    </footer>
  </div>

  <wims-change-password-dialog #changePwDlg />
</div>
