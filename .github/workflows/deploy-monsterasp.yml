name: نشر WIMS على MonsterASP.NET

# يعمل يدوياً فقط (workflow_dispatch) — لا نشر تلقائي عند كل push، تجنّباً لنشر
# غير مقصود لبيئة الاستضافة العامة. شغّله من تبويب Actions في GitHub عند الحاجة.
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # SDK 10 مطلوب هنا لأن الحل بصيغة WIMS.slnx (XML الجديدة) — SDK 8 مش بيعرف يقرأها
      # خالص (MSB4068: The element <Solution> is unrecognized). المشروع نفسه لسه مستهدف
      # net8.0 (مثبَّت في Directory.Build.props) فده SDK البناء بس، مش TargetFramework.
      # ملحوظة: خلل MSB4006 (circular dependency) اللي واجهناه قبل كده كان مرتبط تحديداً
      # بـ DeployOnBuild=true (WebDeploy المدمج في MSBuild)، وده مش مستخدَم هنا أصلاً —
      # النشر هنا عادي (dotnet publish بلا DeployOnBuild) والرفع عبر أكشن منفصل، فمفيش
      # داعي لتفادي SDK 10 في هذا السياق.
      - name: تجهيز .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: تجهيز Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: بناء واجهة Angular (production)
        working-directory: wims-client
        run: |
          npm ci
          npx ng build --configuration production

      - name: نسخ واجهة Angular إلى wwwroot
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src/WIMS.WebApi/wwwroot | Out-Null
          Copy-Item wims-client/dist/wims-client/browser/* src/WIMS.WebApi/wwwroot -Recurse -Force

      - name: استعادة الحزم (dotnet restore)
        run: dotnet restore WIMS.slnx

      - name: البناء (Release)
        run: dotnet build WIMS.slnx --configuration Release --no-restore

      - name: تشغيل الاختبارات
        run: dotnet test WIMS.slnx --configuration Release --no-build

      # نشر عادي بلا DeployOnBuild/WebDeploy — يتجنّب خلل MSB4006 المعروف
      # (راجع DEPLOY-MonsterASP-AR.md) عبر فصل النشر عن خطوة الرفع.
      # ملحوظة: بلا --no-restore عمداً — الاستعادة الأولى (خطوة "استعادة الحزم") كانت
      # بلا RID، فما فيهاش أصول win-x86؛ هنا لازم استعادة جديدة خاصة بـ win-x86
      # (NETSDK1047 لو اتشالت).
      - name: نشر framework-dependent (win-x86)
        run: dotnet publish src/WIMS.WebApi -c Release --runtime win-x86 --self-contained false --output ./publish

      - name: رفع عبر WebDeploy
        uses: rasmusbuchholdt/simply-web-deploy@2.2.0
        with:
          website-name: ${{ secrets.WEBSITE_NAME }}
          server-computer-name: ${{ secrets.SERVER_COMPUTER_NAME }}
          server-username: ${{ secrets.SERVER_USERNAME }}
          server-password: ${{ secrets.SERVER_PASSWORD }}
          source-path: '\publish\'
